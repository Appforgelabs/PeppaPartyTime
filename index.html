<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Peppa's Party Time! 🎉</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; overflow: hidden; height: 100%;
    touch-action: none; overscroll-behavior: none;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display: block; }

  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

  #title {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    font-size: clamp(20px, 4vw, 34px); font-weight: bold; color: #fff;
    text-shadow: 2px 2px 0 #ff5da2, -2px -2px 0 #ff5da2, 2px -2px 0 #ff5da2, -2px 2px 0 #ff5da2, 0 4px 8px rgba(0,0,0,.25);
    white-space: nowrap;
  }

  #stars {
    position: absolute; top: 12px; left: 14px;
    background: rgba(255,255,255,.9); border: 3px solid #ff5da2; border-radius: 20px;
    padding: 6px 16px; font-size: clamp(16px, 3vw, 24px); font-weight: bold; color: #d6336c;
  }

  #musicBtn {
    position: absolute; top: 12px; right: 14px; pointer-events: auto; cursor: pointer;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,.9); border: 3px solid #ff5da2;
    font-size: 26px; display: flex; align-items: center; justify-content: center;
  }

  #banner {
    position: absolute; top: 32%; left: 50%; transform: translate(-50%,-50%) scale(.5);
    font-size: clamp(28px, 7vw, 64px); font-weight: bold; color: #fff; text-align: center;
    text-shadow: 3px 3px 0 #ff5da2, -3px -3px 0 #ff5da2, 3px -3px 0 #ff5da2, -3px 3px 0 #ff5da2, 0 6px 12px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .25s, transform .25s; white-space: nowrap;
  }
  #banner.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #banner.big { font-size: clamp(40px, 10vw, 96px); }

  #danceBtn {
    position: absolute; right: 18px; bottom: 24px; pointer-events: auto; cursor: pointer;
    width: clamp(90px, 18vw, 130px); height: clamp(90px, 18vw, 130px); border-radius: 50%;
    background: linear-gradient(160deg, #ffd23f, #ff9f1c);
    border: 5px solid #fff; box-shadow: 0 6px 16px rgba(0,0,0,.35);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: clamp(30px, 6vw, 44px); color: #7a3b00; font-weight: bold;
  }
  #danceBtn span { font-size: clamp(12px, 2.4vw, 18px); letter-spacing: 1px; }
  #danceBtn.on { animation: pulse .5s infinite alternate; background: linear-gradient(160deg, #ff5da2, #b98cff); color: #fff; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }

  #againBtn {
    position: absolute; left: 50%; bottom: 16%; transform: translateX(-50%);
    pointer-events: auto; cursor: pointer; display: none;
    font-family: inherit; font-size: clamp(20px, 4vw, 32px); font-weight: bold; color: #fff;
    background: linear-gradient(160deg, #3fd2ff, #2b8cff); border: 4px solid #fff; border-radius: 40px;
    padding: 14px 34px; box-shadow: 0 6px 16px rgba(0,0,0,.35);
  }

  #joy {
    position: absolute; left: 22px; bottom: 22px; pointer-events: auto;
    width: 130px; height: 130px; border-radius: 50%;
    background: rgba(255,255,255,.35); border: 3px solid rgba(255,255,255,.7);
  }
  #joyKnob {
    position: absolute; left: 50%; top: 50%; width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,93,162,.9); border: 3px solid #fff;
    transform: translate(-50%,-50%);
  }

  #startOverlay {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(255, 182, 213, .55); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    transition: opacity .5s;
  }
  #startOverlay.hide { opacity: 0; pointer-events: none; }
  #startCard {
    background: rgba(255,255,255,.95); border: 6px solid #ff5da2; border-radius: 30px;
    padding: 28px 40px; text-align: center; max-width: 90vw;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }
  #startCard h1 { margin: 0 0 10px; color: #d6336c; font-size: clamp(30px, 7vw, 52px); line-height: 1.1; }
  #startCard p { color: #7a3b5c; font-size: clamp(16px, 3.4vw, 22px); margin: 8px 0; }
  #playBtn {
    font-family: inherit; font-size: clamp(24px, 5vw, 38px); font-weight: bold; color: #fff;
    background: linear-gradient(160deg, #ff5da2, #ff2e88); border: 4px solid #fff; border-radius: 50px;
    padding: 14px 44px; margin: 14px 0 8px; cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,.3); animation: pulse .8s infinite alternate;
  }
  #startCard .hint { font-size: clamp(12px, 2.6vw, 16px); color: #a06a85; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>
<body>
  <div id="ui">
    <div id="title">🎉 Peppa's Party Time! 🎉</div>
    <div id="stars">⭐ <span id="starCount">0</span> / 10</div>
    <div id="musicBtn" title="Music on/off">🎵</div>
    <div id="banner"></div>
    <div id="danceBtn">💃<span>DANCE!</span></div>
    <button id="againBtn">🎈 Play Again!</button>
    <div id="joy"><div id="joyKnob"></div></div>
  </div>

  <div id="startOverlay">
    <div id="startCard">
      <h1>🐷 Peppa's<br/>Party Time! 🎉</h1>
      <p>Collect all 10 party treats! ⭐<br/>Splash in the muddy puddles! 💦<br/>Press the big button to DANCE! 💃</p>
      <button id="playBtn">▶ Tap to Play!</button>
      <p class="hint">Move: Arrow keys / WASD / pink joystick<br/>Dance: Spacebar or the DANCE button · Music: 🎵 button</p>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
